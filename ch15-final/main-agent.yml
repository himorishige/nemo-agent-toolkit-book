# 最終アプリのフロント: per_user_react_agent が A2A サブエージェント + 組み込み tools を使う
# ch11 の教訓: router_agent の branches は function 名しか受け付けない (function_group 不可)
# ch12 の解: per_user_react_agent + tool_names に function_group 名を入れる方式を採用

general:
  use_uvloop: true
  telemetry:
    tracing:
      phoenix:
        _type: phoenix
        endpoint: http://phoenix:6006/v1/traces
        project: nat-handson-ch15

llms:
  nim_llm:
    _type: nim
    model_name: nvidia/llama-3.3-nemotron-super-49b-v1
    api_key: ${NGC_API_KEY}
    temperature: 0.0
    max_tokens: 512

function_groups:
  # A2A 経由で NAT docs RAG エージェントを取り込む
  nat_docs_a2a:
    _type: a2a_client
    url: http://agent-nat-docs:10001
    task_timeout: 90

functions:
  wiki_lookup:
    _type: wiki_search
    max_results: 2

  current_datetime:
    _type: current_datetime

# per_user_react_agent は tool_names に function_group を直接入れられる
# FastAPI 化して読者は /v1/chat で叩く
workflow:
  _type: per_user_react_agent
  llm_name: nim_llm
  tool_names:
    - nat_docs_a2a
    - wiki_lookup
    - current_datetime
  verbose: true
  max_iterations: 6
  parse_agent_response_max_retries: 5
