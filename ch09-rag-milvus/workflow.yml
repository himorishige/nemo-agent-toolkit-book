general:
  use_uvloop: true

llms:
  nim_llm:
    _type: nim
    model_name: meta/llama-3.1-8b-instruct
    api_key: ${NGC_API_KEY}
    temperature: 0.0
    max_tokens: 512

embedders:
  nim_embed:
    _type: nim
    model_name: nvidia/nv-embedqa-e5-v5
    api_key: ${NGC_API_KEY}

retrievers:
  nat_docs_retriever:
    _type: milvus_retriever
    uri: http://milvus:19530
    collection_name: nat_docs
    embedding_model: nim_embed
    content_field: text
    top_k: 3
    description: >
      Search the official NVIDIA NeMo Agent Toolkit documentation. Use this tool
      to answer questions about NAT features, YAML config, MCP / A2A servers,
      evaluators, retrievers, and related components.

functions:
  search_nat_docs:
    _type: nat_retriever
    retriever: nat_docs_retriever
    topic: 'NeMo Agent Toolkit 公式ドキュメント'

workflow:
  _type: react_agent
  tool_names:
    - search_nat_docs
  llm_name: nim_llm
  verbose: true
  max_iterations: 6
  parse_agent_response_max_retries: 5
