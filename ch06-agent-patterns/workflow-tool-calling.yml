general:
  use_uvloop: true

llms:
  nim_llm:
    _type: nim
    model_name: nvidia/llama-3.3-nemotron-super-49b-v1
    api_key: ${NGC_API_KEY}
    temperature: 0.0
    max_tokens: 512

functions:
  wikipedia_search:
    _type: wiki_search
    max_results: 2

workflow:
  _type: tool_calling_agent
  tool_names:
    - wikipedia_search
  llm_name: nim_llm
  verbose: true
