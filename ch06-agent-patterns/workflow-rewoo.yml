general:
  use_uvloop: true

llms:
  nim_llm:
    _type: nim
    model_name: meta/llama-3.1-8b-instruct
    api_key: ${NGC_API_KEY}
    temperature: 0.0
    max_tokens: 512

functions:
  wikipedia_search:
    _type: wiki_search
    max_results: 2

workflow:
  _type: rewoo_agent
  tool_names:
    - wikipedia_search
  llm_name: nim_llm
  verbose: true
